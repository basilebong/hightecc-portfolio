name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm check
      - run: pnpm i18n:check
      - run: pnpm typecheck
      - name: Forbid NEXT_PUBLIC_ outside src/lib/env.ts
        run: |
          set -e
          matches=$(grep -rEn 'NEXT_PUBLIC_[A-Z0-9_]+' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' \
            src next.config.ts 2>/dev/null \
            | grep -v '^src/lib/env\.ts:' || true)
          if [ -n "$matches" ]; then
            echo "::error::NEXT_PUBLIC_* must only be referenced in src/lib/env.ts. Found:"
            echo "$matches"
            exit 1
          fi

  build:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: Prod
      url: https://hightecc.com
    steps:
      - uses: actions/checkout@v5

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Ship compose.yaml
        run: |
          scp -i ~/.ssh/id_ed25519 \
            deploy/compose.yaml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/hightecc/hightecc-website-26/compose.yaml

      - name: Deploy
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            IMAGE="$IMAGE" bash -s <<'REMOTE'
          set -euo pipefail
          cd /opt/hightecc/hightecc-website-26

          if grep -q '^IMAGE=' .env; then
            sed -i "s|^IMAGE=.*|IMAGE=${IMAGE}|" .env
          else
            echo "IMAGE=${IMAGE}" >> .env
          fi
          if grep -q '^PORT=' .env; then
            sed -i "s|^PORT=.*|PORT=3000|" .env
          else
            echo "PORT=3000" >> .env
          fi

          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          REMOTE

      - name: Healthcheck
        run: |
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://hightecc.com || true)
            if [ "$code" = "200" ]; then
              echo "healthy"
              exit 0
            fi
            echo "attempt $i: got $code, retrying in 5s"
            sleep 5
          done
          echo "site did not become healthy"
          exit 1
