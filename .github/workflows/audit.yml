name: Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    paths:
      - package.json
      - pnpm-lock.yaml
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm audit
