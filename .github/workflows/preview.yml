name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    if: github.event.action != 'closed' && github.event.pull_request.user.login == github.repository_owner && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm check
      - run: pnpm typecheck
      - name: Forbid NEXT_PUBLIC_ outside src/lib/env.ts
        run: |
          set -e
          matches=$(grep -rEn 'NEXT_PUBLIC_[A-Z0-9_]+' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' \
            src next.config.ts 2>/dev/null \
            | grep -v '^src/lib/env\.ts:' || true)
          if [ -n "$matches" ]; then
            echo "::error::NEXT_PUBLIC_* must only be referenced in src/lib/env.ts. Found:"
            echo "$matches"
            exit 1
          fi

  build:
    needs: quality
    if: github.event.action != 'closed' && github.event.pull_request.user.login == github.repository_owner && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}
            type=sha,prefix=sha-,format=long

      - name: Build and push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: github.event.action != 'closed' && github.event.pull_request.user.login == github.repository_owner && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: Preview
      url: https://portfolio-${{ github.event.pull_request.number }}.preview.hightecc.com
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Ship preview files
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if ! [[ "$PR_NUMBER" =~ ^[1-9][0-9]{0,4}$ ]]; then
            echo "PR_NUMBER must be 1-99999, got: $PR_NUMBER" >&2
            exit 1
          fi
          scp -i ~/.ssh/id_ed25519 \
            deploy/preview-compose.yaml \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/preview-compose-${PR_NUMBER}.yaml"
          scp -i ~/.ssh/id_ed25519 \
            deploy/preview-manage.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/hightecc/preview/hightecc-website-26/preview-manage.sh"
          ssh -i ~/.ssh/id_ed25519 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod 0750 /opt/hightecc/preview/hightecc-website-26/preview-manage.sh"

      - name: Deploy preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if ! [[ "$PR_NUMBER" =~ ^[1-9][0-9]{0,4}$ ]]; then
            echo "PR_NUMBER must be 1-99999, got: $PR_NUMBER" >&2
            exit 1
          fi
          ssh -i ~/.ssh/id_ed25519 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "PR_NUMBER='${PR_NUMBER}' IMAGE='${IMAGE}' /opt/hightecc/preview/hightecc-website-26/preview-manage.sh up"

      - name: Healthcheck
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          URL="https://portfolio-${PR_NUMBER}.preview.hightecc.com"
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            if [ "$code" = "200" ]; then
              echo "preview healthy at $URL"
              exit 0
            fi
            echo "attempt $i: got $code, retrying in 5s"
            sleep 5
          done
          echo "preview did not become healthy at $URL"
          exit 1

      - name: Comment URL on PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: preview
          message: |
            Preview: https://portfolio-${{ github.event.pull_request.number }}.preview.hightecc.com

            Built from `${{ github.event.pull_request.head.sha }}`. Tears down when this PR closes.

  teardown:
    if: github.event.action == 'closed' && github.event.pull_request.user.login == github.repository_owner && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Teardown preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if ! [[ "$PR_NUMBER" =~ ^[1-9][0-9]{0,4}$ ]]; then
            echo "PR_NUMBER must be 1-99999, got: $PR_NUMBER" >&2
            exit 1
          fi
          ssh -i ~/.ssh/id_ed25519 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "PR_NUMBER='${PR_NUMBER}' /opt/hightecc/preview/hightecc-website-26/preview-manage.sh down" || true

      - name: Mark preview as torn down
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: preview
          message: |
            Preview torn down.
