services:
  web:
    image: ${IMAGE:-nginx:alpine}
    container_name: hightecc-website-26
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:${PORT:-80}"
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-80}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
