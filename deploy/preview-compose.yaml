services:
  web:
    image: ${IMAGE}
    container_name: portfolio-${PR_NUMBER}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PR_PORT}:${PORT:-3000}"
    env_file: .env
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
