pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,md,mdx}"
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --staged {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm exec tsc --noEmit
    i18n-check:
      glob: "src/**/*.{ts,tsx}"
      run: pnpm i18n:check
    next-public-guard:
      glob: "*.{js,jsx,ts,tsx,mjs}"
      run: |
        bad=$(grep -lE 'NEXT_PUBLIC_[A-Z0-9_]+' {staged_files} 2>/dev/null | grep -v '^src/lib/env\.ts$' || true)
        if [ -n "$bad" ]; then
          echo "NEXT_PUBLIC_* must only be referenced in src/lib/env.ts. Offending files:"
          echo "$bad"
          exit 1
        fi

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    audit:
      run: pnpm audit --prod --audit-level=high
    typecheck:
      run: pnpm exec tsc --noEmit
